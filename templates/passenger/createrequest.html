<!DOCTYPE html>
<html>
<head>
    <title>Create Request</title>
</head>
<body>

<h2>Create Carpool Request</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST" action="/request/create/">
    {% csrf_token %}

    <label>Pickup Location:</label><br>
    <select name="pickup">
        {% for node in nodes %}
            <option value="{{ node.id }}">{{ node.name }}</option>
        {% endfor %}
    </select><br><br>

    <label>Dropoff Location:</label><br>
    <select name="dropoff">
        {% for node in nodes %}
            <option value="{{ node.id }}">{{ node.name }}</option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Create Request</button>
</form>

</body>
</html>
