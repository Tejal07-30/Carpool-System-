{% extends 'base.html' %}

{% block content %}

<h2>Create Request</h2>

<form method="POST">
    {% csrf_token %}

    <label>Pickup:</label>
    <select name="pickupnode">
        {% for node in nodes %}
            <option value="{{ node.id }}">{{ node.name }}</option>
        {% endfor %}
    </select>

    <label>Drop:</label>
    <select name="dropoffnode">
        {% for node in nodes %}
            <option value="{{ node.id }}">{{ node.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Create Request</button>
</form>

{% endblock %}
