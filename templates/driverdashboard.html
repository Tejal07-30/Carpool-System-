<h2>Driver Dashboard</h2>

{% if trip %}
    <p>Active Trip ID: {{ trip.id }}</p>
{% else %}
    <p>No active trip</p>
{% endif %}

<h3>Offers</h3>

{% for offer in offers %}
    <div style="border:1px solid black; padding:10px; margin:10px;">
        <p><strong>Request ID:</strong> {{ offer.request.id }}</p>
        <p><strong>Detour:</strong> {{ offer.detour }}</p>
        <p><strong>Fare:</strong> {{ offer.fare }}</p>
    </div>
{% empty %}
    <p>No offers available</p>
{% endfor %}
